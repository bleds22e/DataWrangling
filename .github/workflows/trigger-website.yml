name: Trigger Website Build

on:
  push:
    branches: [main]
    tags:
      - 'spring-*'
      - 'fall-*'
      - 'summer-*'

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.WEBSITE_DISPATCH_TOKEN }}
          repository: bleds22e/DataWranglingWebsite
          event-type: datawrangling-updated
          client-payload: '{"sha": "${{ github.sha }}", "ref": "${{ github.ref }}", "semester": "${{ startsWith(github.ref, ''refs/tags/'') && github.ref_name || '' }}"}'
